name: Auto Poster Bot

on:
  schedule:
    - cron: '0 3,7,12,15 * * *'   # UTC = 9am, 1pm, 6pm, 9pm IST (IST = UTC+5:30)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic groq instagrapi python-dotenv requests Pillow --quiet

      - name: Write credentials
        env:
          IG_SETTINGS_JSON: ${{ secrets.IG_SETTINGS_JSON }}
        run: |
          printf 'IG_USERNAME=%s\nIG_PASSWORD=%s\nIG_SESSION_FILE=ig_settings.json\nANTHROPIC_API_KEY=%s\nGROQ_API_KEY=%s\n' \
            '${{ secrets.IG_USERNAME }}' '${{ secrets.IG_PASSWORD }}' \
            '${{ secrets.ANTHROPIC_API_KEY }}' '${{ secrets.GROQ_API_KEY }}' > .env
          printf '%s' "$IG_SETTINGS_JSON" > ig_settings.json
          echo "ig_settings.json size: $(wc -c < ig_settings.json) bytes"
          python -c "import json,sys; json.load(open('ig_settings.json')); print('ig_settings.json: valid JSON')"

      - name: Run poster
        run: python -u pa_poster.py

      - name: Save state back to repo
        run: |
          git config user.name  "story-matters-bot"
          git config user.email "bot@story.matters"
          git add posted_content.json content_plan.json brain_memory.json ig_settings.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot: new post published [skip ci]"
          git push || true
