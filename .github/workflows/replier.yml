name: Auto Reply Bot

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    timeout-minutes: 16

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic groq instagrapi python-dotenv requests Pillow --quiet

      - name: Write credentials
        env:
          IG_SETTINGS_JSON: ${{ secrets.IG_SETTINGS_JSON }}
        run: |
          printf 'IG_USERNAME=%s\nIG_PASSWORD=%s\nIG_SESSION_FILE=ig_settings.json\nANTHROPIC_API_KEY=%s\nGROQ_API_KEY=%s\n' \
            '${{ secrets.IG_USERNAME }}' '${{ secrets.IG_PASSWORD }}' \
            '${{ secrets.ANTHROPIC_API_KEY }}' '${{ secrets.GROQ_API_KEY }}' > .env
          printf '%s' "$IG_SETTINGS_JSON" > ig_settings.json
          python -c "import json; json.load(open('ig_settings.json')); print('ig_settings.json: valid JSON')"

      - name: Run replier loop
        id: replier
        run: |
          set +e
          python -u gh_replier_loop.py
          EXIT=$?
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          exit $EXIT
        continue-on-error: true

      - name: Save replied state + updated session
        run: |
          git config user.name  "vibest-bot"
          git config user.email "bot@ooumph.com"
          git add -f replied_comments.json ig_settings.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot: update reply state [skip ci]"
          git stash 2>/dev/null || true
          git pull --rebase origin main || true
          git stash pop 2>/dev/null || true
          git push || true

      - name: Update session secret with refreshed tokens
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python -c "import json; d=json.load(open('ig_settings.json')); exit(0 if '_instagrapi' in d else 1)" 2>/dev/null && \
            gh secret set IG_SETTINGS_JSON --repo ${{ github.repository }} < ig_settings.json || true

      - name: Refresh login on session failure
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          EXIT_CODE="${{ steps.replier.outputs.exit_code }}"
          if [ "$EXIT_CODE" = "2" ]; then
            echo "Session expired — triggering login.yml to refresh"
            gh workflow run login.yml --repo ${{ github.repository }} || true
          else
            echo "Replier completed OK — next run via cron in 30 min"
          fi
